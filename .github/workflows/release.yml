name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Verify version consistency
        run: |
          ROOT_VER=$(node -e "console.log(require('./package.json').version)")
          DESKTOP_VER=$(node -e "console.log(require('./apps/desktop/package.json').version)")
          TAG_VER="${{ steps.version.outputs.VERSION }}"
          if [ "$ROOT_VER" != "$TAG_VER" ] || [ "$DESKTOP_VER" != "$TAG_VER" ]; then
            echo "ERROR: Version mismatch. Root=$ROOT_VER Desktop=$DESKTOP_VER Tag=$TAG_VER"
            exit 1
          fi

  build-mac:
    needs: [validate]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: rm -rf apps/desktop/release
      - run: pnpm exec electron-builder --config electron-builder.yml --publish never
        working-directory: apps/desktop
      - name: Verify macOS disk images
        working-directory: apps/desktop/release
        run: |
          for image in *.dmg; do
            hdiutil verify "$image"
          done
      - name: Generate checksums
        working-directory: apps/desktop/release
        run: |
          shasum -a 256 *.dmg *.zip *.blockmap 2>/dev/null | tee checksums-mac.txt
      - uses: actions/upload-artifact@v4
        with:
          name: release-mac
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest-mac.yml
            apps/desktop/release/checksums-mac.txt
          if-no-files-found: error

  build-win:
    needs: [validate]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: Remove-Item -Recurse -Force apps/desktop/release -ErrorAction SilentlyContinue
      - run: pnpm exec electron-builder --config electron-builder.yml --publish never
        working-directory: apps/desktop
      - name: Generate checksums
        shell: pwsh
        working-directory: apps/desktop/release
        run: |
          Get-ChildItem *.exe, *.zip, *.blockmap | ForEach-Object {
            $hash = (Get-FileHash $_.Name -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)" | Out-File -FilePath checksums-win.txt -Encoding utf8 -Append
          }
      - uses: actions/upload-artifact@v4
        with:
          name: release-win
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest.yml
            apps/desktop/release/checksums-win.txt
          if-no-files-found: error

  build-linux:
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: rm -rf apps/desktop/release
      - run: pnpm exec electron-builder --config electron-builder.yml --publish never
        working-directory: apps/desktop
      - name: Generate checksums
        working-directory: apps/desktop/release
        run: |
          sha256sum *.AppImage *.blockmap 2>/dev/null | tee checksums-linux.txt
      - uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest-linux.yml
            apps/desktop/release/checksums-linux.txt
          if-no-files-found: error

  publish:
    needs: [build-mac, build-win, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: artifacts/
      - name: List artifacts
        run: ls -lhR artifacts/
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.dmg
            artifacts/*.zip
            artifacts/*.AppImage
            artifacts/*.exe
            artifacts/*.blockmap
            artifacts/*.yml
            artifacts/checksums-*.txt
          generate_release_notes: true
          fail_on_unmatched_files: false

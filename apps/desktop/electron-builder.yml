appId: com.relay.desktop
productName: Relay
directories:
  output: release

files:
  # Electron main process files (all 12 .cjs modules)
  - src/main.cjs
  - src/preload.cjs
  - src/workspace-storage.cjs
  - src/git-workflow.cjs
  - src/canonical-path.cjs
  - src/platform-service.cjs
  - src/semver.cjs
  - src/app-settings.cjs
  - src/background-service.cjs
  - src/tray-service.cjs
  - src/updater-service.cjs
  - src/diagnostics-service.cjs

  # App metadata (name, version, license)
  - package.json

  # Icons (used by dock, tray, window, installer)
  - build/icon.png
  - build/icon.icns

  # Renderer (Next.js static export loaded by main.cjs as index.html)
  - from: ../web/out
    to: renderer
    filter:
      - "**/*"
      - "!__next.*.txt"
      - "!*.txt"
      - "!_not-found/**"

extraResources:
  # Claude Code integration plugin (synced to ~/.claude/plugins/ by sync-plugins.mjs)
  - from: ../../integrations/claude-code
    to: integrations/claude-code
    filter:
      - ".claude-plugin/plugin.json"
      - "core/*.js"
      - "hooks/*.mjs"
      - "scripts/relay-progress.mjs"
      - "scripts/statusline.mjs"
      - "scripts/canonical-path.mjs"
      - "scripts/install-statusline.mjs"
      - "skills/progress/SKILL.md"
      - "package.json"

  # Codex integration plugin (synced to ~/.codex/plugins/ by sync-plugins.mjs)
  - from: ../../integrations/codex
    to: integrations/codex
    filter:
      - ".codex-plugin/plugin.json"
      - ".mcp.json"
      - "hooks.json"
      - "core/*.js"
      - "hooks/*.mjs"
      - "scripts/relay-progress.mjs"
      - "scripts/canonical-path.mjs"
      - "mcp/relay-mcp.mjs"
      - "commands/relay.md"
      - "skills/progress/SKILL.md"
      - "package.json"

asar: true

# Auto-update feed. electron-builder embeds this as app-update.yml inside the
# package and publishes latest.yml / latest-mac.yml (+ blockmaps) alongside the
# installers so electron-updater can pick the right asset per OS/arch.
publish:
  provider: github
  owner: jacobpowaza
  repo: Relay
  releaseType: release

mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  # entitlements: build/entitlements.mac.plist   # add when signing/notarizing
  target:
    # DMG for first install; ZIP is required for macOS auto-update.
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64

win:
  icon: build/icon.png
  target:
    - target: nsis
      arch:
        - x64
        - arm64

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true

linux:
  category: Development
  icon: build/icon.png
  target:
    - AppImage
